name: VSCode Extension

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Build bundled backend
        working-directory: vscode-extension
        run: npm run build:server

      - name: Test extension
        working-directory: vscode-extension
        run: npm test

      - name: Package extension
        working-directory: vscode-extension
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          npx --yes @vscode/vsce package --no-dependencies --out "go-callchain-vscode-${VERSION}.vsix"
          echo "VSIX_PATH=vscode-extension/go-callchain-vscode-${VERSION}.vsix" >> "$GITHUB_ENV"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-callchain-vscode-vsix
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error
